<div class="container py-5">
  <div class="card border-danger mx-auto confirm-card">
    <div class="card-header bg-danger text-white">
      <h5 class="mb-0"><i class="bi bi-exclamation-triangle"></i> Klant verwijderen</h5>
    </div>
    <div class="card-body">
      <p>Weet u zeker dat u <strong>{{ naam() }}</strong> wilt verwijderen?</p>
      <p class="text-muted small">Dit kan niet ongedaan worden gemaakt.</p>
      <div class="d-flex gap-2">
        <button class="btn btn-danger" (click)="bevestig()">
          <i class="bi bi-trash"></i> Verwijderen
        </button>
        <a routerLink="/klanten" class="btn btn-secondary">Annuleren</a>
      </div>
    </div>
  </div>
</div>
