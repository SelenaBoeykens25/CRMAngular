<div class="container d-flex justify-content-center align-items-center min-vh-100">
  <div class="card shadow login-card">
    <div class="card-header text-center">
      <h4 class="mb-0">Inloggen</h4>
    </div>
    <div class="card-body">
      @if (error()) {
        <div class="alert alert-danger">{{ error() }}</div>
      }
      <form (ngSubmit)="login()">
        <div class="mb-3">
          <label class="form-label" for="email">E-mailadres</label>
          <input id="email" type="email" class="form-control"
            [ngModel]="email()" (ngModelChange)="email.set($event)"
            name="email" required autocomplete="username" />
        </div>
        <div class="mb-3">
          <label class="form-label" for="wachtwoord">Wachtwoord</label>
          <input id="wachtwoord" type="password" class="form-control"
            [ngModel]="wachtwoord()" (ngModelChange)="wachtwoord.set($event)"
            name="wachtwoord" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn-primary w-100" [disabled]="isLoading()">
          @if (isLoading()) {
            <span class="spinner-border spinner-border-sm me-2"></span>
          }
          Inloggen
        </button>
      </form>
    </div>
  </div>
</div>
