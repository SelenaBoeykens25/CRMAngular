<form (ngSubmit)="handleFilter()">
  <div class="row g-2 align-items-end">
    <div class="col-12 col-md-6 col-lg-6">
      <input type="text" class="form-control" placeholder="Zoek..."
             autofocus [(ngModel)]="filterText" name="filterText" />
    </div>
    <div class="col-12 col-md-4 col-lg-3">
      <select class="form-select" [(ngModel)]="filterOp" name="filterOp" title="Filter op">
        <option value="Naam">Naam</option>
        <option value="Email">Email</option>
        <option value="Telefoon">Telefoon</option>
        <option value="Adres">Adres</option>
      </select>
    </div>
    <div class="col-12 col-md-2 col-lg-3">
      <button type="submit" class="btn btn-primary w-100">
        <span class="bi bi-search"></span> Filter
      </button>
    </div>
  </div>
</form>
